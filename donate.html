<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>jipcam - 후원</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;500;600;700&amp;family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;font-family:'Inter','Noto Sans KR',system-ui,sans-serif}
  *{box-sizing:border-box}
  a{color:inherit}

  .page{
    min-height:100vh;
    background:
      radial-gradient(ellipse at 10% 0%, #F5D0FE 0%, transparent 50%),
      radial-gradient(ellipse at 90% 20%, #FCE7F3 0%, transparent 55%),
      radial-gradient(ellipse at 50% 80%, #E9D5FF 0%, transparent 60%),
      #FDF9FF;
    color:#0B0814;
    padding:120px 64px 80px;
  }

  .nav-wrap{
    position:fixed; top:0; left:0; right:0; z-index:50;
    padding:20px 0; display:flex; justify-content:center;
    background:#fdf9ff; pointer-events:none;
  }
  .nav{
    pointer-events:auto;
    display:flex; align-items:center; gap:22px;
    padding:8px 8px 8px 18px;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(20px);
    border:1px solid rgba(11,8,20,0.08);
    border-radius:999px;
    box-shadow:0 1px 2px rgba(11,8,20,0.06), 0 8px 24px -12px rgba(192,38,211,0.15);
    white-space:nowrap;
  }
  .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#0B0814}
  .nav-logo img{width:26px;height:26px}
  .nav-logo span{font-weight:700;font-size:17px;letter-spacing:-0.02em}
  .nav-sep{width:1px;height:16px;background:rgba(11,8,20,0.08)}
  .nav-links{display:flex;align-items:center;gap:22px;font-size:13px;color:rgba(11,8,20,0.62)}
  .nav-links a{text-decoration:none;color:inherit;transition:color 0.2s}
  .nav-links a:hover{color:#C026D3}
  .nav-dl{
    padding:10px 18px; background:#0B0814; color:#fff;
    border-radius:14px; font-weight:600; font-size:13px;
    text-decoration:none;
  }

  .container{max-width:880px;margin:0 auto}
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    padding:6px 14px; background:rgba(255,255,255,0.7);
    backdrop-filter:blur(12px);
    border:1px solid rgba(11,8,20,0.08);
    border-radius:999px;
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:11px; color:#C026D3; letter-spacing:0.06em; font-weight:600;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:999px;background:#C026D3;box-shadow:0 0 8px #C026D3}
  h1{
    margin:24px 0 22px;
    font-size:clamp(48px, 7vw, 92px); font-weight:700;
    letter-spacing:-0.045em; line-height:0.95;
  }
  .lede{
    font-size:18px; line-height:1.65; color:rgba(11,8,20,0.65);
    max-width:640px; margin:0 0 56px;
  }

  .qr-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:24px;
    margin-bottom:36px;
  }
  .qr-card{
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(20px);
    border:1px solid rgba(11,8,20,0.08);
    border-radius:24px;
    box-shadow:0 40px 80px -20px rgba(192,38,211,0.18);
    padding:40px 32px;
    text-align:center;
    transition:transform 0.3s ease, box-shadow 0.3s ease;
  }
  .qr-card:hover{
    transform:translateY(-4px);
    box-shadow:0 48px 90px -20px rgba(192,38,211,0.25);
  }
  .qr-card .icon{
    width:48px; height:48px; margin:0 auto 16px;
    border-radius:12px;
    display:grid; place-items:center; font-size:24px;
    border:1px solid rgba(11,8,20,0.08);
  }
  .qr-card .icon.kakao{background:#FEE500}
  .qr-card .icon.toss{background:#0064FF}
  .qr-card .name{
    font-size:20px; font-weight:700; letter-spacing:-0.02em;
    margin-bottom:6px;
  }
  .qr-card .desc{
    font-size:13px; color:rgba(11,8,20,0.55); margin-bottom:24px;
  }
  .qr-card img.qr{
    width:220px; height:220px; border-radius:12px;
    border:1px solid rgba(11,8,20,0.06);
  }
  .qr-card .how{
    margin-top:16px;
    font-size:12px; color:rgba(11,8,20,0.45);
    font-family:'JetBrains Mono',ui-monospace,monospace;
  }

  .sidenote{
    margin-top:32px;
    padding:18px 22px;
    background:rgba(255,255,255,0.5);
    backdrop-filter:blur(12px);
    border:1px solid rgba(11,8,20,0.08);
    border-radius:14px;
    display:flex; align-items:flex-start; gap:14px;
    font-size:14px; color:rgba(11,8,20,0.7); line-height:1.65;
  }
  .sidenote .badge{flex-shrink:0;color:#C026D3;font-weight:700}

  footer{
    margin-top:80px;
    padding:32px 64px 40px;
    border-top:1px solid rgba(11,8,20,0.08);
  }
  .foot{
    max-width:1280px;margin:0 auto;
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:12px; color:rgba(11,8,20,0.62);
  }
  .foot a{text-decoration:none;color:inherit;transition:color 0.2s}
  .foot a:hover{color:#C026D3}

  @media (max-width:768px){
    .page{padding:96px 18px 60px}
    .nav-links,.nav-sep{display:none}
    .nav{gap:10px;padding:6px 6px 6px 14px}
    .nav-dl{padding:8px 14px;font-size:12px}
    h1{font-size:clamp(36px,9vw,56px)}
    .lede{font-size:15px;margin-bottom:36px}
    .qr-grid{grid-template-columns:1fr;gap:16px}
    .qr-card{padding:28px 20px}
    .qr-card img.qr{width:180px;height:180px}
    footer{padding:20px 18px 28px}
    .foot{flex-direction:column;align-items:center;text-align:center}
  }
</style>
</head>
<body>
<div class="page">

  <!-- Nav -->
  <div class="nav-wrap">
    <div class="nav">
      <a class="nav-logo" href="index.html">
        <img id="navIcon" alt="">
        <span>jipcam</span>
      </a>
      <div class="nav-sep"></div>
      <div class="nav-links">
        <a href="index.html#features">기능</a>
        <a href="index.html#usage">사용법</a>
        <a href="index.html#workflow">워크플로우</a>
        <a href="index.html#faq">자주 묻는 질문</a>
        <a href="feedback.html">개선 요청</a>
        <a href="donate.html" >후원</a>
      </div>
      <a class="nav-dl" href="index.html">다운로드 ↗</a>
    </div>
  </div>

  <!-- Header -->
  <div class="container">
    <h1>커피 한 잔으로<br>응원해주세요.</h1>
    <p class="lede">
      광고 없는 무료 도구를 계속 유지하는 데 쓰입니다.
    </p>

    <!-- QR Cards -->
    <div class="qr-grid">
      <div class="qr-card">
        <div class="icon kakao">💬</div>
        <div class="name">카카오페이</div>
        <div class="desc">카카오톡 앱으로 QR을 스캔하세요</div>
        <img class="qr" src="assets/kakaopay_qr.png" alt="카카오페이 QR">
        <div class="how">카카오톡 → 스캔 → 송금</div>
      </div>
      <div class="qr-card">
        <div class="icon toss" style="color:#fff">💙</div>
        <div class="name">토스</div>
        <div class="desc">토스 앱으로 QR을 스캔하세요</div>
        <img class="qr" src="assets/toss_qr.jpg" alt="토스 QR">
        <div class="how">토스 → 스캔 → 송금</div>
      </div>
    </div>

    <div class="sidenote">
      <span class="badge">♥</span>
      <div>
        후원금은 jipcam의 지속적인 개발과 서버 유지에 사용됩니다.
        금액에 상관없이 모든 후원에 감사드립니다.
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer>
  <div class="foot">
    <div style="display:flex;align-items:center;gap:8px">
      <img id="footIcon" width="18" height="18" style="opacity:0.7" alt="">
      <span>© 2026 jipcam · v1.0.8</span>
    </div>
    <div style="display:flex;gap:24px;flex-wrap:wrap;justify-content:center">
      <a href="feedback.html">개선 요청</a>
      <a href="donate.html">후원</a>
    </div>
  </div>
</footer>

<script>
  document.getElementById('navIcon').src = 'assets/icon.png';
  document.getElementById('footIcon').src = 'assets/icon.png';
</script>
</body>
</html>
